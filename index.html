<!DOCTYPE html>
<html>
<head>
<title>Daily Routine</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(270deg, #0f172a, #1e293b, #020617);
    background-size: 600% 600%;
    animation: bgMove 10s infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(30,41,59,0.8);
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,255,150,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #16a34a;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #334155;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    animation: slideIn 0.4s ease;
}

@keyframes slideIn {
    from {transform: translateX(-20px); opacity:0;}
    to {transform: translateX(0); opacity:1;}
}

.delete {
    background: red;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.delete:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="container">
    <h2>⚡ Daily Routine</h2>

    <div class="input-group">
        <input id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
async function addTask() {
    const task = document.getElementById("taskInput").value;

    await fetch("/add-task", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({task})
    });

    document.getElementById("taskInput").value = "";
    loadTasks();
}

async function loadTasks() {
    const res = await fetch("/tasks");
    const data = await res.json();

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    data.forEach(t => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${t.task}
            <span class="delete" onclick="deleteTask(${t.id})">X</span>
        `;

        list.appendChild(li);
    });
}

async function deleteTask(id) {
    await fetch("/delete-task", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id})
    });

    loadTasks();
}

loadTasks();
</script>

</body>
</html>
