<!DOCTYPE html>
<html>
<head>
<title>Routine Pro</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(270deg,#0f172a,#1e293b,#020617);
    background-size: 600% 600%;
    animation: bg 10s infinite;
    color:white;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.container {
    max-width:400px;
    margin:auto;
    margin-top:50px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

input,select {
    padding:8px;
    margin:5px;
    width:100%;
}

button {
    background:#22c55e;
    border:none;
    padding:10px;
    margin-top:5px;
    cursor:pointer;
}

.progress {
    height:10px;
    background:#334155;
    margin:10px 0;
}

.progress-bar {
    height:10px;
    background:#22c55e;
}

.overdue {
    color:red;
}

</style>
</head>

<body>

<div class="container">

<h2>🔥 Routine Pro</h2>

<input id="taskInput" placeholder="Task">
<select id="category">
<option>Study</option>
<option>Gym</option>
<option>Work</option>
</select>

<input type="date" id="dueDate">

<button onclick="addTask()">Add Task</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="stats"></p>
<p id="streak"></p>

<ul id="taskList"></ul>

</div>

<script>
async function addTask(){
    const task = document.getElementById("taskInput").value;
    const category = document.getElementById("category").value;
    const dueDate = document.getElementById("dueDate").value;

    await fetch("/add-task",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({task,category,dueDate})
    });

    loadTasks();
}

async function loadTasks(){
    const res = await fetch("/tasks");
    const data = await res.json();

    const tasks = data.tasks;
    const streak = data.streak;

    let completed = tasks.filter(t=>t.status==="completed").length;

    document.getElementById("progressBar").style.width =
        (tasks.length ? (completed/tasks.length)*100 : 0) + "%";

    document.getElementById("stats").innerText =
        `${completed}/${tasks.length} completed`;

    document.getElementById("streak").innerText =
        `🔥 Streak: ${streak}`;

    const list = document.getElementById("taskList");
    list.innerHTML="";

    tasks.forEach(t=>{
        const li = document.createElement("li");

        const overdue = t.dueDate && new Date(t.dueDate) < new Date() && t.status !== "completed";

        li.innerHTML = `
        <span style="${t.status==='completed' ? 'text-decoration:line-through' : ''}"
              class="${overdue ? 'overdue' : ''}">
            ${t.task} (${t.category})
        </span>
        <div>
            <button onclick="completeTask(${t.id})">✔</button>
            <button onclick="deleteTask(${t.id})">X</button>
        </div>
        `;

        list.appendChild(li);
    });
}

async function completeTask(id){
    await fetch("/complete-task",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });
    loadTasks();
}

async function deleteTask(id){
    await fetch("/delete-task",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });
    loadTasks();
}

loadTasks();
</script>

</body>
</html>
